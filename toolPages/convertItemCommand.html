<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>コマンド生成 — yoruteraTool</title>
  <link rel="stylesheet" href="../common.css">
</head>
<body>
  <div class="site-bar">
    <span>YoruteraTool — convertItemCommand</span>
    <a href="../index.html" class="home-button">ホーム</a>
  </div>
  <div class="wrap">
    <h1>アイテム交換コマンド</h1>
    <p class="lead">入力欄の値から <code>give</code> / <code>tellraw</code> / <code>clear</code> の3行を生成します。</p>

    <div class="card">
      <h2>パラメータ</h2>
      <div class="field">
        <label for="inItem">① 入力アイテムID <span class="en">(Input Item ID)</span></label>
        <input type="text" id="inItem" autocomplete="off" placeholder="例: diamond" />
      </div>
      <div class="field">
        <label for="inCount">② 入力数 <span class="en">(Input Count)</span></label>
        <input type="text" id="inCount" inputmode="numeric" autocomplete="off" placeholder="例: 5" />
      </div>
      <div class="field">
        <label for="outItem">③ 出力アイテムID <span class="en">(Output Item ID)</span></label>
        <input type="text" id="outItem" autocomplete="off" placeholder="例: emerald" />
      </div>
      <div class="field">
        <label for="outCount">④ 出力数 <span class="en">(Output Count)</span></label>
        <input type="text" id="outCount" inputmode="numeric" autocomplete="off" placeholder="例: 1" />
      </div>
    </div>

    <div class="card">
      <div class="output-head">
        <h2>生成コマンド</h2>
        <button type="button" class="copy" id="copyBtn">コピー</button>
      </div>
      <pre class="cmd" id="cmdOut"></pre>
      <p class="hint">全角で入力した英数字は半角に自動変換されます。②は1以上の整数を想定しています。</p>
      <p class="warn" id="warnMsg"></p>
    </div>


  </div>

  <footer>
    <p>© 2026 Yorutera Operations</p>
  </footer>

  <script>
    (function () {
      /** 全角英数字・記号・スペースを半角へ（FF01–FF5E、全角スペース） */
      function toHalfWidth(str) {
        if (!str) return "";
        return str
          .replace(/\u3000/g, " ")
          .replace(/[\uff01-\uff5e]/g, function (ch) {
            return String.fromCharCode(ch.charCodeAt(0) - 0xfee0);
          });
      }

      function normalizeOnInput(el) {
        var start = el.selectionStart;
        var end = el.selectionEnd;
        var before = el.value;
        var after = toHalfWidth(before);
        if (before !== after) {
          el.value = after;
          if (start != null && end != null) {
            el.setSelectionRange(start, end);
          }
        }
      }

      function buildCommands() {
        var inItem = toHalfWidth(document.getElementById("inItem").value.trim());
        var inCountStr = toHalfWidth(document.getElementById("inCount").value.trim());
        var outItem = toHalfWidth(document.getElementById("outItem").value.trim());
        var outCountStr = toHalfWidth(document.getElementById("outCount").value.trim());

        var warn = document.getElementById("warnMsg");
        warn.classList.remove("show");
        warn.textContent = "";

        if (!inItem && !inCountStr && !outItem && !outCountStr) {
          return "（上の欄に値を入力してください）";
        }

        var n = parseInt(inCountStr, 10);
        if (!/^\d+$/.test(inCountStr) || n < 1) {
          warn.textContent = "② 入力数は1以上の半角整数で入力してください。";
          warn.classList.add("show");
        }

        var outN = parseInt(outCountStr, 10);
        var giveQty = /^\d+$/.test(outCountStr) && outN >= 1 ? outN : 1;

        var prev = Math.max(0, n - 1);
        var line1 =
          "give @initiator[hasitem={item=" +
          inItem +
          ",quantity=" +
          n +
          "..}] " +
          outItem +
          " " +
          giveQty;
        var line2 =
          'tellraw @initiator[hasitem={item=' +
          inItem +
          ",quantity=.." +
          prev +
          '}] {"rawtext":[{"text":"§4アイテムが足りません！§r"}]}';
        var line3 =
          "clear @initiator[hasitem={item=" +
          inItem +
          ",quantity=" +
          n +
          "..}] " +
          inItem +
          " -1 " +
          n;

        return line1 + "\n" + line2 + "\n" + line3;
      }

      function refresh() {
        document.getElementById("cmdOut").textContent = buildCommands();
      }

      ["inItem", "inCount", "outItem", "outCount"].forEach(function (id) {
        var el = document.getElementById(id);
        el.addEventListener("input", function () {
          normalizeOnInput(el);
          refresh();
        });
        el.addEventListener("blur", function () {
          normalizeOnInput(el);
          refresh();
        });
      });

      document.getElementById("copyBtn").addEventListener("click", function () {
        var text = document.getElementById("cmdOut").textContent;
        if (!text || text.indexOf("（上の欄") === 0) return;

        var btn = document.getElementById("copyBtn");
        navigator.clipboard.writeText(text).then(
          function () {
            btn.textContent = "コピーしました";
            btn.classList.add("copied");
            setTimeout(function () {
              btn.textContent = "コピー";
              btn.classList.remove("copied");
            }, 2000);
          },
          function () {
            btn.textContent = "コピー失敗";
            setTimeout(function () {
              btn.textContent = "コピー";
            }, 2000);
          }
        );
      });

      refresh();
    })();
  </script>
</body>
</html>
