    <h1>アイテムID検索</h1>
    <p class="lead">日本語表示名から統合版（Bedrock）のアイテム／ブロックIDを検索します。</p>
    <div class="search-panel">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="日本語アイテム名を入力..." autocomplete="off" />
        <button id="searchBtn" type="button" class="btn-primary">検索</button>
      </div>
    <p class="hint">日本語表示名の<strong>部分一致</strong>で検索します。統合版（Bedrock）のコマンド用IDは vanilla では多くの場合 <code>名前空間なし</code>（例: <code>diamond_sword</code>）で指定できます。公式訳では Trial 系は「<strong>試練</strong>」（例: 試練の鍵）となり、「トライアル」ではヒットしないことがあります。</p>
    <div id="results">
      <div class="idle-hint">キーワードを入力すると、日本語名と統合版アイテムIDが一覧表示されます。</div>
    </div>

"}];
var searchInput=document.getElementById('searchInput');
var searchBtn=document.getElementById('searchBtn');
var resultsDiv=document.getElementById('results');
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function normalizeForSearch(s){
  try{return String(s).normalize('NFKC').trim();}catch(e){return String(s).trim();}
}
function inviconUrl(shortId){
  var title=shortId.split('_').map(function(w){
    if(!w.length)return w;return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
  }).join('_');
  return 'https://minecraft.wiki/images/Invicon_'+title+'.png';
}
function renderResults(items){
  if(items.length===0){
    resultsDiv.innerHTML='<div class="no-result">一致するアイテムが見つかりません</div>';
    return;
  }
  var html='<p class="count-bar">'+items.length+' 件</p>';
  html+='<table class="results-table"><thead><tr>';
  html+='<th class="col-icon">見た目</th><th>アイテム名</th><th>統合版アイテムID</th>';
  html+='</tr></thead><tbody>';
  items.forEach(function(item){
    var sid=item.id;
    var safeName=escapeHtml(item.name);
    var safeId=escapeHtml(sid);
    var encId=encodeURIComponent(sid);
    var iconSrc=inviconUrl(sid);
    html+='<tr>';
    html+="<td class=\"col-icon\"><img class=\"item-icon\" src=\""+escapeHtml(iconSrc)+"\" alt=\"\" loading=\"lazy\" onerror=\"this.style.visibility='hidden'\"></td>";
    html+='<td class="col-name">'+safeName+'</td>';
    html+='<td class="col-id"><div class="id-row"><span>'+safeId+'</span>';
    html+='<button type="button" class="copy-btn" data-copy="'+encId+'">コピー</button></div></td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  resultsDiv.innerHTML=html;
  resultsDiv.querySelectorAll('.copy-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var raw=btn.getAttribute('data-copy');
      if(!raw)return;
      var t=decodeURIComponent(raw);
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(t).then(function(){
          var prev=btn.textContent;btn.textContent='済';
          setTimeout(function(){btn.textContent=prev;},900);
        }).catch(function(){fallbackCopy(t,btn);});
      }else{fallbackCopy(t,btn);}
    });
  });
}
function fallbackCopy(text,btn){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');var prev=btn.textContent;btn.textContent='済';setTimeout(function(){btn.textContent=prev;},900);}catch(e){}
  document.body.removeChild(ta);
}
function search(){
  var keyword=normalizeForSearch(searchInput.value);
  if(keyword===''){
    resultsDiv.innerHTML='<div class="idle-hint">キーワードを入力すると、日本語名と統合版アイテムIDが一覧表示されます。</div>';
    return;
  }
  var results=ITEMS.filter(function(item){
    return normalizeForSearch(item.name).indexOf(keyword)!==-1;
  });
  renderResults(results);
}
searchBtn.addEventListener('click',search);
searchInput.addEventListener('input',search);
searchInput.addEventListener('keydown',function(e){if(e.key==='Enter')search();});
})();
